# Minimal local dev/test setup.
#   docker compose up -d
#   docker compose exec php sh                              # interactive shell
#   docker compose exec php composer install
#   docker compose exec php vendor/bin/phpunit
#
# Xdebug:
#   Loaded but off by default (zero perf cost). Enable per-command:
#     docker compose exec -e XDEBUG_MODE=debug    php vendor/bin/phpunit --filter=...
#     docker compose exec -e XDEBUG_MODE=coverage php vendor/bin/phpunit --coverage-html=var/coverage

services:
  php:
    build: ./docker
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      COMPOSER_ALLOW_SUPERUSER: 1
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      # Lets Xdebug reach the host on Linux Docker engines (incl. WSL2).
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
    command: tail -f /dev/null

volumes:
  composer-cache:
